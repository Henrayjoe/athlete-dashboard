<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Performance Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#f2f3f5; --surface:#fff; --surface-alt:#f8f9fa;
    --border:#e4e6ea; --text-primary:#0d1117; --text-secondary:#444c56; --text-muted:#7a8290;
    --accent:#1a56db; --accent-light:#ebf0fd;
    --c-exceeds-bg:#f0fdf4; --c-exceeds-text:#14532d;
    --c-meets-bg:#eff6ff;   --c-meets-text:#1e3a5f;
    --c-near-bg:#fffbeb;    --c-near-text:#78350f;
    --c-below-bg:#fff7ed;   --c-below-text:#7c2d12;
    --c-priority-bg:#fef2f2;--c-priority-text:#7f1d1d;
    --radius:8px; --radius-lg:12px;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text-primary); font-size:13px; line-height:1.5; min-height:100vh; }
  .app { display:grid; grid-template-columns:248px 1fr; min-height:100vh; }
  .sidebar { background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow:hidden; }
  .sb-brand { padding:18px 16px 14px; border-bottom:1px solid var(--border); }
  .sb-brand h1 { font-size:14px; font-weight:700; }
  .sb-brand p  { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; margin-top:2px; }
  .sb-search { padding:10px 12px; border-bottom:1px solid var(--border); }
  .sb-search input { width:100%; padding:6px 10px; font-size:12px; background:var(--surface-alt); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); outline:none; }
  .sb-search input:focus { border-color:var(--accent); }
  .sb-search input::placeholder { color:var(--text-muted); }
  .alist { flex:1; overflow-y:auto; padding:6px 0; }
  .aitem { display:flex; align-items:center; gap:10px; padding:8px 14px; cursor:pointer; border-left:2px solid transparent; }
  .aitem:hover { background:var(--surface-alt); }
  .aitem.active { background:var(--accent-light); border-left-color:var(--accent); }
  .av { width:32px; height:32px; border-radius:50%; background:var(--accent-light); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; }
  .aitem.active .av { background:var(--accent); color:#fff; }
  .ameta { flex:1; min-width:0; }
  .aname { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .apos  { font-size:11px; color:var(--text-muted); }
  .sdot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .settings-bar { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; border-top:1px solid var(--border); background:var(--surface-alt); }
  .settings-bar span { font-size:11px; color:var(--text-muted); }
  .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-size:13px; font-weight:600; cursor:pointer; margin-top:12px; }
  .btn:hover { background:#1447c0; }
  .btn-sm { padding:5px 12px; font-size:12px; background:var(--surface-alt); color:var(--text-secondary); border:1px solid var(--border); border-radius:var(--radius); cursor:pointer; font-weight:500; }
  .btn-sm:hover { background:var(--border); }
  .main { padding:24px 28px; display:flex; flex-direction:column; gap:20px; }
  .state-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:12px; text-align:center; }
  .state-screen h2 { font-size:16px; font-weight:600; color:var(--text-secondary); }
  .state-screen p  { font-size:13px; color:var(--text-muted); max-width:440px; line-height:1.6; }
  .config-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:24px 28px; max-width:540px; width:100%; text-align:left; }
  .config-box h3 { font-size:15px; font-weight:700; margin-bottom:6px; }
  .config-box p  { font-size:12px; color:var(--text-secondary); margin-bottom:16px; line-height:1.6; }
  .config-box label { font-size:12px; font-weight:600; display:block; margin-bottom:4px; margin-top:12px; }
  .config-box input { width:100%; padding:8px 12px; font-size:13px; border:1px solid var(--border); border-radius:var(--radius); outline:none; color:var(--text-primary); }
  .config-box input:focus { border-color:var(--accent); }
  .hint { font-size:11px; color:var(--text-muted); margin-top:8px; line-height:1.6; }
  .profile-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px; display:flex; gap:16px; align-items:flex-start; }
  .pav { width:52px; height:52px; border-radius:50%; background:var(--accent-light); color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; flex-shrink:0; }
  .pinfo h2    { font-size:20px; font-weight:700; letter-spacing:-.02em; }
  .pinfo .pmeta { font-size:12px; color:var(--text-secondary); margin-top:3px; }
  .ptags { display:flex; gap:6px; margin-top:10px; flex-wrap:wrap; }
  .ptag  { font-size:11px; padding:3px 9px; border-radius:20px; background:var(--surface-alt); border:1px solid var(--border); color:var(--text-secondary); }
  .ptag.inj { background:#fffbeb; border-color:#fbbf24; color:#92400e; }
  .cat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  .cat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; }
  .cat-name   { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; font-weight:600; margin-bottom:5px; }
  .cat-status { font-size:13px; font-weight:600; }
  .sec-heading { font-size:10px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.08em; font-weight:600; margin-bottom:8px; padding-left:2px; }
  .tab-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
  .tabs { display:flex; border-bottom:1px solid var(--border); background:var(--surface-alt); }
  .tab { padding:10px 18px; font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; }
  .tab:hover { color:var(--text-primary); }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); background:var(--surface); }
  .tc { display:none; }
  .tc.active { display:block; }
  .results-body { padding:18px 20px; display:flex; flex-direction:column; gap:18px; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  thead th { padding:7px 14px; text-align:left; font-size:10px; font-weight:600; color:var(--text-muted); letter-spacing:.06em; text-transform:uppercase; background:var(--surface-alt); border-bottom:1px solid var(--border); }
  tbody td { padding:10px 14px; border-bottom:1px solid #f3f4f6; vertical-align:middle; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr:hover { background:#fafbfc; }
  td.lbl { color:var(--text-secondary); }
  .miss  { color:var(--text-muted); font-style:italic; font-size:11px; }
  .rval  { font-size:14px; font-weight:600; }
  .runit { font-size:11px; color:var(--text-muted); margin-left:3px; }
  .rsub  { font-size:11px; color:var(--text-muted); margin-left:6px; }
  .delta { font-size:12px; font-weight:600; }
  .pill  { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
  .pill-dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .p4{background:var(--c-exceeds-bg);color:var(--c-exceeds-text)}
  .p3{background:var(--c-meets-bg);color:var(--c-meets-text)}
  .p2{background:var(--c-near-bg);color:var(--c-near-text)}
  .p1{background:var(--c-below-bg);color:var(--c-below-text)}
  .p0{background:var(--c-priority-bg);color:var(--c-priority-text)}
  .calc-badge { display:inline-block; font-size:10px; background:#f0f4ff; color:#4a6fa5; border:1px solid #ccd9f0; border-radius:4px; padding:1px 5px; margin-left:5px; font-weight:500; vertical-align:middle; }
  .status-key { display:flex; flex-wrap:wrap; gap:6px; padding:14px 20px; border-top:1px solid var(--border); background:var(--surface-alt); align-items:center; }
  .key-label  { font-size:10px; color:var(--text-muted); font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-right:4px; }
  .charts-body { padding:18px 20px; display:flex; flex-direction:column; gap:14px; }
  .chart-grid  { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .chart-wrap  { background:var(--surface-alt); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
  .chart-title { font-size:11px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
  .chart-note  { font-size:11px; color:var(--text-muted); display:flex; gap:16px; flex-wrap:wrap; }
  .print-header { display:none; }


  .norm-source { display:block; font-size:9.5px; color:#bbb; margin-top:2px; font-style:italic; }
  @media print { .norm-source { display:none !important; } }

  .quadrant-controls { display:flex; align-items:center; gap:8px; }
  .control-label { font-size:11px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.06em; margin-right:4px; }
  .axis-btn { padding:5px 12px; font-size:12px; font-weight:500; background:var(--surface-alt); border:1px solid var(--border); border-radius:6px; cursor:pointer; color:var(--text-secondary); }
  .axis-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
  .axis-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .quadrant-legend { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .ql-dot { display:inline-block; width:10px; height:10px; border-radius:50%; }
  .ql-you  { background:var(--accent); border:2px solid #fff; box-shadow:0 0 0 1px var(--accent); }
  .ql-anon { background:#cbd5e1; border:1px solid #94a3b8; }


  .feedback-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; gap:14px; text-align:center; }
  .feedback-empty p { font-size:13px; color:var(--text-muted); max-width:360px; line-height:1.6; }
  .feedback-empty h3 { font-size:15px; font-weight:600; color:var(--text-secondary); }
  .feedback-loading { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 20px; gap:12px; }
  .feedback-loading p { font-size:13px; color:var(--text-muted); }
  .spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .feedback-section { background:var(--surface-alt); border:1px solid var(--border); border-radius:var(--radius-lg); overflow:hidden; }
  .feedback-section-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--surface); }
  .feedback-section-label { font-size:11px; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:.07em; }
  .feedback-section-label span { font-size:10px; font-weight:400; color:var(--text-muted); margin-left:8px; text-transform:none; letter-spacing:0; }
  .feedback-text { padding:16px 18px; font-size:13px; line-height:1.75; color:var(--text-primary); white-space:pre-wrap; }
  .copy-btn { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:4px 10px; background:var(--surface); border:1px solid var(--border); border-radius:6px; cursor:pointer; color:var(--text-secondary); font-weight:500; }
  .copy-btn:hover { background:var(--accent-light); color:var(--accent); border-color:var(--accent); }
  .copy-btn.copied { background:#f0fdf4; color:#16a34a; border-color:#16a34a; }
  .feedback-meta { font-size:11px; color:var(--text-muted); padding:0 18px 12px; }
  .regenerate-row { display:flex; justify-content:flex-end; padding-top:4px; }
  @media print {
    body { background:#fff; font-size:11px; }
    .app { display:block; }
    .sidebar, .no-print, .settings-bar { display:none !important; }
    .main { padding:0; }
    .print-header { display:flex; align-items:center; gap:14px; padding-bottom:14px; margin-bottom:14px; border-bottom:2px solid #0d1117; }
    .print-header img { height:32px; }
    .print-header-meta { font-size:12px; color:#444c56; display:flex; flex-direction:column; }
    .print-header-meta strong { font-size:15px; color:#0d1117; }
    .profile-card, .cat-card, .chart-wrap, .tab-card { border:1px solid #ccc !important; box-shadow:none !important; }
    .tabs { display:none !important; }
    .tc { display:block !important; }
    .tc.active { display:block !important; }
    table { font-size:10px; }
    .chart-grid { grid-template-columns:1fr 1fr; page-break-inside:avoid; }
    .chart-wrap { page-break-inside:avoid; }
    .test-section, .results-body > div { page-break-inside:avoid; }
    a { color:inherit; text-decoration:none; }
  }

  @media(max-width:900px){
    .app{grid-template-columns:1fr} .sidebar{position:static;height:auto}
    .cat-grid{grid-template-columns:repeat(2,1fr)} .chart-grid{grid-template-columns:1fr}
  }
</style>
</head>

//   EUR:       McGuigan et al. JSCR 2006

//   IMTP:      Badby et al. JSS 2025 (professional soccer N/kg benchmarks)
//   Aerobic:   Cardamone et al. Front Physiol 2025 (Serie A VO2 ~61.5); Buchheit & Laursen
//   Strength:  Comfort et al. JSCR 2019; professional football literature
//   Speed:     Haugen et al. IJSPP 2019
// lb:true = lower is better

const NORMS = {
  // ── Jump / Power ──────────────────────────────────────────────────────────
  broad_jump:    { min:220,  max:260,  u:'cm',        lb:false, label:'Broad jump',              cat:'jump', source:'Loturco et al.; professional football literature' },
  // No validated professional football-specific normative dataset exists for SL broad jump absolute distance.
  // Tracked for individual longitudinal comparison only — no min/max scoring applied.
  slbj_L:        { min:null, max:null, u:'cm',        lb:false, label:'SL broad jump — L',       cat:'jump', noNorm:true, source:'No validated professional norm' },
  slbj_R:        { min:null, max:null, u:'cm',        lb:false, label:'SL broad jump — R',       cat:'jump', noNorm:true, source:'No validated professional norm' },
  // LSI: healthy footballers show natural variance of 97-106% (scoping review, 27 studies, JOSPT 2024).
  // <90% is a distinct injury-risk threshold (not a benchmark tier) — flagged separately in the UI.
  slbj_LSI:      { min:90,   max:100,  u:'%',         lb:false, label:'SL broad jump LSI',       cat:'jump', injuryFloor:90, source:'JOSPT scoping review 2024 (27 studies, soccer)' },
  // Triple hop (single-leg): collegiate male soccer/basketball average 632±72cm (Myers et al. 2014).
  // No professional-specific dataset found — moderate confidence, not pro-validated.
  triple_hop:    { min:560,  max:704,  u:'cm',        lb:false, label:'Triple hop (SL)',         cat:'jump', note:'Collegiate data, not pro-specific', source:'Myers et al. 2014 (collegiate soccer/basketball)' },
  cmj:           { min:35,   max:55,   u:'cm',        lb:false, label:'CMJ height',              cat:'jump', source:'Badby et al. 2025; VALD ForceDecks normative data' },
  sj:            { min:30,   max:50,   u:'cm',        lb:false, label:'Squat jump (SJ)',         cat:'jump', source:'Professional football literature' },
  eur:           { min:0.90, max:1.15, u:'EUR',       lb:false, label:'EUR (CMJ÷SJ)',            cat:'jump',  note:'Auto: CMJ÷SJ', source:'McGuigan et al. 2006' },
  // mRSI: CMJ jump height (m) ÷ contraction time (s). Pro football ~0.8–1.4 (McMahon/Badby)
  cmj_mrsi:      { min:0.80, max:1.40, u:'m/s',       lb:false, label:'CMJ mRSI',               cat:'jump',  note:'Auto: JH(m)÷CT(s) — needs contraction time', source:'McMahon et al. 2022; Badby et al. 2025' },
  // DJ RSI: DJ height (m) ÷ contact time (s). Pro football ~1.0–1.8 (McMahon 2021)
  dj_rsi:        { min:1.00, max:1.80, u:'m/s',       lb:false, label:'DJ RSI',                 cat:'jump',  note:'Auto: JH(m)÷CT(s) — needs contact time', source:'McMahon et al. 2021' },
  dj:            { min:30,   max:50,   u:'cm',        lb:false, label:'Drop jump height (DJ)',   cat:'jump', source:'Professional football literature' },
  // DSI: ballistic PF ÷ isometric PF. Optimal 0.60–0.80 (Thomas et al. 2017)
  // >0.80 = needs strength work; <0.60 = needs plyometric work
  dsi:           { min:0.60, max:0.80, u:'DSI',       lb:false, label:'DSI',                    cat:'jump',  note:'Requires force plate', source:'Thomas, Dos\'Santos & Jones 2017' },
  // ── Aerobic ───────────────────────────────────────────────────────────────
  mas:           { min:5.0,  max:6.2,  u:'m/s',       lb:false, label:'MAS (5-min TT)',          cat:'aero', source:'Buchheit & Laursen 2013' },
  vo2max:        { min:58,   max:68,   u:'ml/kg/min', lb:false, label:'Est. VO₂ max',            cat:'aero', source:'Cardamone et al. 2025 (Serie A ~61.5 ml/kg/min); Buchheit' },
  // ── Strength ──────────────────────────────────────────────────────────────
  sq_1rm_bw:     { min:1.5,  max:2.0,  u:'×BW',       lb:false, label:'Back squat',             cat:'strength', source:'Comfort et al. 2019 (professional football)' },
  tb_1rm_bw:     { min:2.0,  max:2.8,  u:'×BW',       lb:false, label:'Trap bar DL',            cat:'strength', source:'Professional football literature' },
  bp_1rm_bw:     { min:0.9,  max:1.3,  u:'×BW',       lb:false, label:'Bench press',            cat:'strength', source:'Professional football literature' },
  // IMTP: relative peak force N/kg. Pro soccer median ~40 N/kg (Badby et al. 2025)
  // <30 N/kg = below norm for professional; 30–45 = within range; >45 = exceeds
  imtp:          { min:30,   max:45,   u:'N/kg',      lb:false, label:'IMTP',                   cat:'strength', note:'Requires force plate', source:'Badby et al. 2025 (professional soccer; median ~40 N/kg)' },
  // ── Additional aerobic tests ──────────────────────────────────────────────

  beep_level:   { min:13, max:16, u:'level', lb:false, label:'Beep test level', cat:'aero', source:'Ramsbottom et al. 1988; professional football literature' },

  bronco:       { min:240,  max:280,  u:'s',   lb:true,  label:'Bronco',     cat:'aero', note:'Lower is better · Limited football data', source:'Rugby league reference; limited football-specific data' },

  yoyo_ir2:     { min:640,  max:1200, u:'m',   lb:false, label:'Yo-Yo IR2',  cat:'aero', note:'Castagna et al. 2006', source:'Castagna et al. 2006; professional football' },

  max_vel:       { min:8.3,  max:9.5,  u:'m/s',       lb:false, label:'Max velocity (20m fly)', cat:'speed', source:'LaLiga match-speed data; EPL fastest-ever ~10.4 m/s' },
};

const CAT_LABELS = { jump:'Jump / Power', aero:'Aerobic', strength:'Strength', speed:'Speed' };
const SL = ['Priority Area','Below Benchmark','Near Benchmark','Meets Benchmark','Exceeds Benchmark'];

const CC = ['#1a56db','#7c3aed','#0891b2','#16a34a','#dc2626','#c2410c','#6b7280'];

// ─── CALCULATIONS ─────────────────────────────────────────────────────────────
const pf  = v => { const n = parseFloat(v); return isNaN(n) || n === 0 ? null : n; };
const epley = (kg, reps) => { const k=pf(kg),r=pf(reps); if(!k||!r)return null; return r===1?k:+(k*(1+r/30)).toFixed(1); };
const masFromDist = d => { const v=pf(d); return v?+(v/300).toFixed(2):null; }; // m/s
// Léger & Mercier (1984): VO2max (ml/kg/min) = MAS (km/h) × 3.5. MAS is stored in m/s, so convert to km/h first.
const vo2FromMas  = mas_ms => { const v=pf(mas_ms); return v?+((v*3.6)*3.5).toFixed(1):null; };
const calcLSI     = (L,R) => { const l=pf(L),r=pf(R); return(l&&r)?+(Math.min(l,r)/Math.max(l,r)*100).toFixed(1):null; };
// Format seconds → MM:SS
const fmtTime = s => { if(!s)return'—'; const m=Math.floor(s/60),sec=Math.round(s%60); return `${m}:${String(sec).padStart(2,'0')}`; };
// VO2max from any distance TT — Daniels & Gilbert 1979
function vo2FromDistTT(dist_m, time_s) {
  if(!dist_m||!time_s||time_s<60)return null;
  const v=(dist_m/time_s)*60; // m/min
  const t=time_s/60;          // min
  const frac=0.8+0.1894393*Math.exp(-0.012778*t)+0.2989558*Math.exp(-0.1932605*t);
  const vo2v=-4.60+0.182258*v+0.000104*v*v;
  const est=+(vo2v/frac).toFixed(1);
  return est>20&&est<100?est:null; // sanity bounds
}
// VO2max from Yo-Yo IR2 distance — Castagna et al. 2006
const vo2FromYoyo = d => { const v=pf(d); return v?+(v*0.0136+45.3).toFixed(1):null; };
// Beep test speed (km/h) from level
const beepSpeed = lvl => { const v=pf(lvl); return v?+(8.5+(v-1)*0.5):null; };
// VO2max from beep test level + age — Léger et al. 1988
function vo2FromBeep(level, age_yr) {
  const v=beepSpeed(level); if(!v)return null;
  const a=parseFloat(age_yr)||25;
  const est=+(31.025+3.238*v-3.248*a+0.1536*v*a).toFixed(1);
  return est>20&&est<100?est:null;
}
const bwRatio     = (rm,bw) => (rm&&bw)?+(rm/bw).toFixed(2):null;
const imtpNkg     = (N,bw) => { const n=pf(N),b=pf(bw); return(n&&b)?+(n/b).toFixed(2):null; };
// mRSI = jump height (m) ÷ contraction time (s)
const calcMrsi    = (cm,ms) => { const h=pf(cm),t=pf(ms); return(h&&t)?+((h/100)/(t/1000)).toFixed(2):null; };
// DJ RSI = jump height (m) ÷ contact time (s)
const calcDjRsi   = (cm,ms) => { const h=pf(cm),t=pf(ms); return(h&&t)?+((h/100)/(t/1000)).toFixed(2):null; };
// EUR = CMJ ÷ SJ (jump height)
const calcEur     = (cmj,sj) => { const c=pf(cmj),s=pf(sj); return(c&&s)?+(c/s).toFixed(2):null; };

function deriveSession(row, bw_kg, age_yr) {
  // Per-session bodyweight takes priority; falls back to athlete's profile weight
  const bw = pf(row.weight_kg) || pf(bw_kg);
  const d  = {};
  d.weight_kg   = bw; // store whichever was used, for display
  d.notes       = (row.notes || '').trim();
  // Jump — direct
  d.broad_jump  = pf(row.broad_jump_cm);
  d.slbj_L      = pf(row.slbj_L_cm);
  d.slbj_R      = pf(row.slbj_R_cm);
  d.slbj_LSI    = calcLSI(row.slbj_L_cm, row.slbj_R_cm);
  d.triple_hop  = pf(row.triple_hop_cm);
  d.cmj         = pf(row.cmj_cm);
  d.sj          = pf(row.sj_cm);
  d.dj          = pf(row.dj_cm);
  // EUR — auto from CMJ and SJ
  d.eur         = calcEur(row.cmj_cm, row.sj_cm);
  // mRSI — auto if contraction time provided, else null (future-proof)
  d.cmj_ct_ms   = pf(row.cmj_contraction_time_ms);
  d.cmj_mrsi    = calcMrsi(row.cmj_cm, row.cmj_contraction_time_ms);
  // DJ RSI — auto if contact time provided
  d.dj_ct_ms    = pf(row.dj_contact_time_ms);
  d.dj_rsi      = calcDjRsi(row.dj_cm, row.dj_contact_time_ms);
  // DSI — direct (force plate only)
  d.dsi         = pf(row.dsi);
  // Aerobic
  d.tt5min_dist = pf(row.tt5min_dist_m);
  d.mas         = masFromDist(row.tt5min_dist_m);
  d.mas_vo2max  = d.mas ? vo2FromMas(d.mas) : null;
  // General distance TT (any distance)
  d.tt_dist     = pf(row.tt_dist_m);
  d.tt_time     = pf(row.tt_time_s);
  d.tt_speed    = (d.tt_dist&&d.tt_time)?+(d.tt_dist/d.tt_time).toFixed(3):null; // m/s
  d.tt_vo2max   = vo2FromDistTT(d.tt_dist, d.tt_time);
  // Yo-Yo IR2
  d.yoyo_ir2     = pf(row.yoyo_ir2_dist_m);
  d.yoyo_vo2max  = vo2FromYoyo(row.yoyo_ir2_dist_m);
  // Beep test (MSFT)
  d.beep_level   = pf(row.beep_level);
  d.beep_shuttle = pf(row.beep_shuttle);
  d.beep_speed   = beepSpeed(row.beep_level); // km/h
  d.beep_vo2max  = vo2FromBeep(row.beep_level, age_yr);
  // Bronco
  d.bronco       = pf(row.bronco_time_s);
  // Best available VO2max — 5-min TT first priority, then others
  d.vo2max = d.mas_vo2max || d.tt_vo2max || d.yoyo_vo2max || d.beep_vo2max || pf(row.vo2max);
  // Strength — Epley → BW ratio (uses session bodyweight)
  const sq1rm   = epley(row.sq_kg, row.sq_reps);
  const tb1rm   = epley(row.tb_kg, row.tb_reps);
  const bp1rm   = epley(row.bp_kg, row.bp_reps);
  d.sq_1rm      = sq1rm; d.sq_kg_raw = pf(row.sq_kg); d.sq_reps_raw = pf(row.sq_reps);
  d.tb_1rm      = tb1rm; d.tb_kg_raw = pf(row.tb_kg); d.tb_reps_raw = pf(row.tb_reps);
  d.bp_1rm      = bp1rm; d.bp_kg_raw = pf(row.bp_kg); d.bp_reps_raw = pf(row.bp_reps);
  d.sq_1rm_bw   = bwRatio(sq1rm, bw);
  d.tb_1rm_bw   = bwRatio(tb1rm, bw);
  d.bp_1rm_bw   = bwRatio(bp1rm, bw);
  d.imtp_raw_N  = pf(row.imtp_N);
  d.imtp        = imtpNkg(row.imtp_N, bw);
  // Speed
  d.sprint10    = pf(row.sprint10_s);
  d.sprint20    = pf(row.sprint20_s);
  d.max_vel     = pf(row.max_vel_ms);
  d.test_date   = row.test_date;
  return d;
}

// ─── BENCHMARK SCORING ───────────────────────────────────────────────────────
function bs(v, nk) {
  const n = NORMS[nk]; if (!n || v==null || n.noNorm) return null;
  if (n.lb) {
    if (v<=n.min) return 4; if (v<=n.max) return 3;
    if (v<=n.min*1.10) return 2; if (v<=n.min*1.20) return 1; return 0;
  } else {
    if (v>=n.max) return 4; if (v>=n.min) return 3;
    if (v>=n.min*0.90) return 2; if (v>=n.min*0.80) return 1; return 0;
  }
}
function injuryFlag(v, nk) {
  const n = NORMS[nk];
  if (!n || !n.injuryFloor || v==null) return null;
  return v < n.injuryFloor;
}
function pill(s) {
  if (s===null) return '';
  return `<span class="pill ${SC[s]}"><span class="pill-dot" style="background:${SD[s]}"></span>${SL[s]}</span>`;
}
function dHtml(val, prev, lb) {
  if (val==null||prev==null) return '<span class="miss">—</span>';
  const d=((val-prev)/prev*100), imp=lb?d<0:d>0, unc=Math.abs(d)<0.5;
  const col=unc?'#7a8290':imp?'#16a34a':'#dc2626';
  return `<span class="delta" style="color:${col}">${unc?'→':imp?'↑':'↓'} ${d>0?'+':''}${d.toFixed(1)}%</span>`;
}
function catLabel(avg) {
  if (avg===null) return null;
  if (avg>=3.5) return {l:'Strong Area',     c:'#16a34a'};
  if (avg>=2.5) return {l:'On Track',        c:'#1a56db'};
  if (avg>=1.5) return {l:'Developing Area', c:'#c2410c'};
  return              {l:'Priority Focus',  c:'#dc2626'};
}
function catCard(catKey, keys, d) {
  const scores = keys.map(k=>bs(d[k],k)).filter(s=>s!==null);
  if (!scores.length) return `<div class="cat-card"><div class="cat-name">${CAT_LABELS[catKey]}</div><div class="cat-status" style="color:#7a8290">No data</div></div>`;
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
  const cl  = catLabel(avg);
  return `<div class="cat-card" style="border-left:3px solid ${cl.c}"><div class="cat-name">${CAT_LABELS[catKey]}</div><div class="cat-status" style="color:${cl.c}">${cl.l}</div></div>`;
}
function sidebarCol(d) {
  if (!d) return '#7a8290';
  const scores = Object.keys(NORMS).map(k=>bs(d[k],k)).filter(s=>s!==null);
  if (!scores.length) return '#7a8290';
  const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
  return avg>=3.5?'#16a34a':avg>=2.5?'#1a56db':avg>=1.5?'#c2410c':'#dc2626';
}
// Get most recently tested value for a key across all sessions (sessions sorted newest-first)
function latestVal(sessions, key) {
  for (const s of sessions) { if (s[key]!=null) return s[key]; }
  return null;
}
// Build a composite "best available" data object across all sessions for category scoring
function buildLatestAcrossSessions(sessions) {
  const out = {};
  Object.keys(NORMS).forEach(k => { out[k] = latestVal(sessions, k); });
  return out;
}

// ─── TABLE ROW BUILDERS ───────────────────────────────────────────────────────
function mRow(nk, val, prevVal, subtext, isAuto) {
  const n = NORMS[nk]; if (!n) return '';
  const normText = n.noNorm ? 'No validated norm' : `${n.min}–${n.max} ${n.u}`;
  const normStyle = n.noNorm ? 'font-style:italic;color:var(--text-muted)' : 'color:var(--text-muted)';
  if (val==null) return `<tr><td class="lbl">${n.label}${n.note?` <span style="font-size:10px;color:var(--text-muted)">(${n.note})</span>`:''}</td><td colspan="2" class="miss">— not tested</td><td style="font-size:11px;${normStyle}">${normText}${n.source?`<span class="norm-source">${n.source}</span>`:''}</td><td class="miss">—</td></tr>`;
  const s = bs(val, nk);
  const sub = subtext ? `<span class="rsub">${subtext}</span>` : '';
  const badge = isAuto ? '<span class="calc-badge">auto</span>' : '';
  const flagged = injuryFlag(val, nk);
  const statusCell = n.noNorm
    ? `<span style="font-size:11px;color:var(--text-muted);font-style:italic">Track individually</span>`
    : flagged
      ? `<span class="pill p0" style="background:#fef2f2"><span class="pill-dot" style="background:#dc2626"></span>Injury risk flag (&lt;${n.injuryFloor}%)</span>`
      : pill(s);
  return `<tr>
    <td class="lbl">${n.label}</td>
    <td><span class="rval">${val}</span><span class="runit">${n.u}</span>${sub}${badge}</td>
    <td>${statusCell}</td>
    <td style="font-size:11px;${normStyle}">${normText}${n.source?`<span class="norm-source">${n.source}</span>`:''}</td>
    <td>${dHtml(val, prevVal, n.lb)}</td>
  </tr>`;
}
function strengthRow(nk, d, pv, label) {
  const n = NORMS[nk];
  const normText  = `${n.min}–${n.max} ${n.u}`;
  const srcAttr   = '';
  const srcIcon   = '';
  const srcText   = n.source ? `<span class="norm-source">${n.source}</span>` : '';
  const val  = d[nk], prev = pv?pv[nk]:null;
  const pfx  = nk.replace('_1rm_bw','');
  const kg   = d[pfx+'_kg_raw'], reps = d[pfx+'_reps_raw'], rm1 = d[pfx+'_1rm'];
  if (val==null) return `<tr><td class="lbl">${label}</td><td colspan="2" class="miss">— not tested</td><td style="font-size:11px;color:var(--text-muted)">${normText}${n.source?`<span class="norm-source">${n.source}</span>`:''}</td><td class="miss">—</td></tr>`;
  const s = bs(val, nk);
  let sub = reps&&reps>1 ? `<span class="rsub">(${kg}kg × ${reps} → est. 1RM ${rm1}kg)</span>` : rm1?`<span class="rsub">(1RM ${rm1}kg)</span>`:'';
  return `<tr>
    <td class="lbl">${label}</td>
    <td><span class="rval">${val}</span><span class="runit">×BW</span>${sub}<span class="calc-badge">auto</span></td>
    <td>${pill(s)}</td>
    <td style="font-size:11px;color:var(--text-muted)">${normText}${srcText}</td>
    <td>${dHtml(val, prev, false)}</td>
  </tr>`;
}

// ─── DATA STATE ───────────────────────────────────────────────────────────────
let athleteMap={}, selectedId=null, searchQ='';

// ─── GOOGLE SHEETS ────────────────────────────────────────────────────────────
const getConfig = () => { try{return JSON.parse(localStorage.getItem('dashConfig')||'{}')}catch(e){return{}} };
const saveConfig = c => localStorage.setItem('dashConfig', JSON.stringify(c));

async function fetchSheet(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status} — check the URL`);
  return r.text();
}
function parseCSV(text) {
  const lines = text.trim().split('\n').map(l => {
    const cols=[]; let cur='', inQ=false;
    for (const ch of l) {
      if (ch==='"'){inQ=!inQ} else if (ch===','&&!inQ){cols.push(cur.trim());cur=''} else {cur+=ch}
    }
    cols.push(cur.trim()); return cols;
  });
  const headers = lines[0].map(h=>h.trim());
  return lines.slice(1).filter(r=>r.some(c=>c)).map(r=>{
    const obj={}; headers.forEach((h,i)=>obj[h]=(r[i]||'').trim()); return obj;
  });
}
async function loadData() {
  const cfg = getConfig();
  if (!cfg.athletesUrl||!cfg.resultsUrl){showSetup();return;}
  showLoading();
  try {
    const [aText,rText] = await Promise.all([fetchSheet(cfg.athletesUrl),fetchSheet(cfg.resultsUrl)]);
    const athletes=parseCSV(aText), results=parseCSV(rText);
    athleteMap={};
    athletes.forEach(a=>{
      // Calculate age from birthdate (YYYY-MM-DD) if present; fall back to static age field
      let computedAge = null;
      if (a.birthdate && /\d{4}-\d{2}-\d{2}/.test(a.birthdate)) {
        const diff = Date.now() - new Date(a.birthdate).getTime();
        computedAge = Math.floor(diff / (365.25*24*60*60*1000));
      } else {
        computedAge = parseFloat(a.age) || null;
      }
      athleteMap[a.id]={...a, age:computedAge, sessions:[]};
    });
    results.forEach(r=>{
      if(athleteMap[r.athlete_id]) athleteMap[r.athlete_id].sessions.push(deriveSession(r,athleteMap[r.athlete_id].weight_kg,athleteMap[r.athlete_id].age));
    });
    Object.values(athleteMap).forEach(a=>a.sessions.sort((x,y)=>new Date(y.test_date)-new Date(x.test_date)));
    document.getElementById('sheetStatus').textContent=`${athletes.length} athletes · ${results.length} sessions`;
    renderList();
    const ids=Object.keys(athleteMap);
    if(ids.length){selectedId=ids[0];renderMain();}
  } catch(e){showError(e.message);}
}

let CI={};
function mkChart(id,labels,datasets,yLabel,nMin,nMax){
  if(CI[id]){CI[id].destroy();delete CI[id];}
  const el=document.getElementById(id); if(!el)return;
  const allV=datasets.flatMap(d=>d.data).filter(v=>v!=null&&!isNaN(v));
  if(!allV.length){el.parentElement.style.display='none';return;}
  el.parentElement.style.display='';
  const dMin=Math.min(...allV,nMin),dMax=Math.max(...allV,nMax),pad=(dMax-dMin)*0.22;
  CI[id]=new Chart(el.getContext('2d'),{
    type:'line',
    data:{labels,datasets:[
      {label:'_nu',data:labels.map(()=>nMax),borderColor:'transparent',backgroundColor:'rgba(26,86,219,0.07)',fill:'+1',pointRadius:0,tension:0,borderWidth:0},
      {label:'_nl',data:labels.map(()=>nMin),borderColor:'rgba(26,86,219,0.22)',backgroundColor:'transparent',fill:false,pointRadius:0,tension:0,borderDash:[4,3],borderWidth:1.5},
      ...datasets
    ]},
    options:{
      responsive:true,maintainAspectRatio:true,aspectRatio:1.9,
      plugins:{
        legend:{display:datasets.length>1,position:'bottom',labels:{font:{size:10},boxWidth:10,padding:8,filter:i=>!i.text.startsWith('_')}},
        tooltip:{filter:i=>!i.dataset.label.startsWith('_'),callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y} ${yLabel}`}}
      },
      scales:{
        x:{ticks:{font:{size:10}},grid:{display:false}},
        y:{min:+(dMin-pad).toFixed(2),max:+(dMax+pad).toFixed(2),ticks:{font:{size:10},maxTicksLimit:4},grid:{color:'rgba(0,0,0,0.05)'},title:{display:true,text:yLabel,font:{size:10}}}
      }
    }
  });
}
function ls(col,dash=[]){return{borderColor:col,backgroundColor:col,fill:false,tension:0.3,pointRadius:4,pointHoverRadius:6,borderWidth:2,borderDash:dash,spanGaps:true};}

function drawCharts(){
  const a=athleteMap[selectedId]; if(!a||!a.sessions.length)return;
  const sessions=[...a.sessions].reverse();
  // Chart.js fill:'+1' needs ≥2 x-points to render a shaded area.
  // If only 1 session, duplicate the label so the band always shows.
  const lb = sessions.length === 1
    ? [sessions[0].test_date, sessions[0].test_date]
    : sessions.map(s=>s.test_date);
  const ser=(key,col,dash=[])=>({label:NORMS[key]?.label||key,...ls(col,dash),
    data:sessions.length===1
      ? [sessions[0][key], sessions[0][key]]   // duplicate so band fills
      : sessions.map(s=>s[key])
  });

  const charts=[
    {id:'ch-broadjump',  title:'Broad jump',  u:'cm', nk:'broad_jump',  ds:[ser('broad_jump',CC[0])]},
    {id:'ch-triplehop',  title:'Triple hop',  u:'cm', nk:'triple_hop',  ds:[ser('triple_hop',CC[2])]},
    {id:'ch-lsi',    title:'SL Broad jump LSI',       u:'%',    nk:'slbj_LSI',    ds:[ser('slbj_LSI',CC[1])]},
    {id:'ch-cmj',    title:'CMJ / SJ heights',        u:'cm',   nk:'cmj',         ds:[ser('cmj',CC[0]),ser('sj',CC[1],[5,3])]},
    {id:'ch-eur',    title:'EUR (CMJ÷SJ)',             u:'ratio',nk:'eur',         ds:[ser('eur',CC[3])]},
    {id:'ch-mrsi',   title:'CMJ mRSI',                u:'m/s',  nk:'cmj_mrsi',    ds:[ser('cmj_mrsi',CC[0])]},
    {id:'ch-djrsi',  title:'DJ RSI',                  u:'m/s',  nk:'dj_rsi',      ds:[ser('dj_rsi',CC[4])]},
    {id:'ch-mas',    title:'MAS — 5-min TT',          u:'m/s',  nk:'mas',         ds:[ser('mas',CC[3])]},
    {id:'ch-squat', title:'Back squat (×BW)',    u:'×BW', nk:'sq_1rm_bw', ds:[ser('sq_1rm_bw',CC[4])]},
    {id:'ch-tb',    title:'Trap bar DL (×BW)',   u:'×BW', nk:'tb_1rm_bw', ds:[ser('tb_1rm_bw',CC[5])]},
    {id:'ch-bp',    title:'Bench press (×BW)',   u:'×BW', nk:'bp_1rm_bw', ds:[ser('bp_1rm_bw',CC[6])]},
    {id:'ch-sprint10', title:'10m sprint', u:'s', nk:'sprint10', ds:[ser('sprint10',CC[0])]},
    {id:'ch-sprint20', title:'20m sprint', u:'s', nk:'sprint20', ds:[ser('sprint20',CC[1])]},
    {id:'ch-vel',    title:'Max velocity (20m fly)',  u:'m/s',  nk:'max_vel',     ds:[ser('max_vel',CC[4])]},
  ];

  const grid=document.getElementById('chartGrid'); if(!grid)return;
  grid.innerHTML=charts.map(ch=>`<div class="chart-wrap" id="wrap-${ch.id}"><div class="chart-title">${ch.title}</div><canvas id="${ch.id}"></canvas></div>`).join('');
  charts.forEach(ch=>{const n=NORMS[ch.nk];if(n)mkChart(ch.id,lb,ch.ds,ch.u,n.min,n.max);});
}

function buildResultsForPrompt(a) {
  const ld = buildLatestAcrossSessions(a.sessions);
  const pv = a.sessions.length > 1 ? a.sessions[1] : null;
  const bw = parseFloat(a.weight_kg);
  const lines = [];

  function dText(val, prev, lb) {
    if (!val || !prev) return '';
    const d = ((val-prev)/prev*100);
    const imp = lb ? d<0 : d>0;
    return ` (${imp?'improved':'regressed'} ${d>0?'+':''}${d.toFixed(1)}%)`;
  }
  function row(label, val, nk, prevVal, lb=false) {
    if (val==null) return;
    const s = bs(val, nk);
    const status = s!==null ? SL[s] : 'no validated norm';
    lines.push(`${label}: ${val} ${NORMS[nk]?.u||''} — ${status}${dText(val, prevVal, lb)}`);
  }

  lines.push('=== JUMP / POWER ===');
  row('Broad jump',    ld.broad_jump, 'broad_jump', prevVal('broad_jump'));
  if (ld.slbj_L)  lines.push(`SL broad jump L: ${ld.slbj_L}cm (no validated norm)`);
  if (ld.slbj_R)  lines.push(`SL broad jump R: ${ld.slbj_R}cm (no validated norm)`);
  if (ld.slbj_LSI!=null) {
    const flag = ld.slbj_LSI < 90 ? ' WARNING: INJURY RISK FLAG (<90%)' : '';
    const stat = bs(ld.slbj_LSI,'slbj_LSI')!==null ? SL[bs(ld.slbj_LSI,'slbj_LSI')] : '';
    lines.push(`SL broad jump LSI: ${ld.slbj_LSI}% — ${stat}${flag}${dText(ld.slbj_LSI, pv?.slbj_LSI, false)}`);
  }
  row('Triple hop',   ld.triple_hop, 'triple_hop', prevVal('triple_hop'));
  row('CMJ height',   ld.cmj,        'cmj',        prevVal('cmj'));
  row('SJ height',    ld.sj,         'sj',         prevVal('sj'));
  row('EUR',          ld.eur,        'eur',        prevVal('eur'));
  row('CMJ mRSI',     ld.cmj_mrsi,   'cmj_mrsi',   prevVal('cmj_mrsi'));
  row('DJ height',    ld.dj,         'dj',         prevVal('dj'));
  row('DJ RSI',       ld.dj_rsi,     'dj_rsi',     prevVal('dj_rsi'));
  row('DSI',          ld.dsi,        'dsi',        prevVal('dsi'));

  lines.push('=== AEROBIC ===');
  row('MAS',          ld.mas,        'mas',        pv?.mas);
  row('Est. VO2max',  ld.vo2max,     'vo2max',     pv?.vo2max);

  lines.push('=== STRENGTH ===');
  if (ld.sq_1rm_bw!=null) lines.push(`Back squat: ${ld.sq_1rm_bw}xBW${ld.sq_1rm?' (est. 1RM '+ld.sq_1rm+'kg)':''} — ${SL[bs(ld.sq_1rm_bw,'sq_1rm_bw')]||''}${dText(ld.sq_1rm_bw, pv&&bw?+(pv.sq_1rm/bw).toFixed(2):null, false)}`);
  if (ld.tb_1rm_bw!=null) lines.push(`Trap bar DL: ${ld.tb_1rm_bw}xBW${ld.tb_1rm?' (est. 1RM '+ld.tb_1rm+'kg)':''} — ${SL[bs(ld.tb_1rm_bw,'tb_1rm_bw')]||''}${dText(ld.tb_1rm_bw, pv&&bw?+(pv.tb_1rm/bw).toFixed(2):null, false)}`);
  if (ld.bp_1rm_bw!=null) lines.push(`Bench press: ${ld.bp_1rm_bw}xBW${ld.bp_1rm?' (est. 1RM '+ld.bp_1rm+'kg)':''} — ${SL[bs(ld.bp_1rm_bw,'bp_1rm_bw')]||''}${dText(ld.bp_1rm_bw, pv&&bw?+(pv.bp_1rm/bw).toFixed(2):null, false)}`);
  row('IMTP',         ld.imtp,       'imtp',       prevVal('imtp'));

  lines.push('=== SPEED ===');
  row('10m sprint',   ld.sprint10,   'sprint10',   pv?.sprint10, true);
  row('20m sprint',   ld.sprint20,   'sprint20',   pv?.sprint20, true);
  row('Max velocity', ld.max_vel,    'max_vel',    prevVal('max_vel'));

  return lines.join('\n');
}

function buildCategoryStatusForPrompt(a) {
  const ld = buildLatestAcrossSessions(a.sessions);
  const cats = [
    {name:'Jump/Power', keys:['broad_jump','slbj_LSI','triple_hop','cmj','sj','eur','cmj_mrsi','dj','dj_rsi','dsi']},
    {name:'Aerobic',    keys:['mas','vo2max']},
    {name:'Strength',   keys:['sq_1rm_bw','tb_1rm_bw','bp_1rm_bw','imtp']},
    {name:'Speed',      keys:['sprint10','sprint20','max_vel']},
  ];
  return cats.map(cat => {
    const scores = cat.keys.map(k=>bs(ld[k],k)).filter(s=>s!==null);
    if (!scores.length) return `${cat.name}: No data available`;
    const avg = scores.reduce((a,b)=>a+b,0)/scores.length;
    return `${cat.name}: ${catLabel(avg).l}`;
  }).join('\n');
}

// ─── TEMPLATE-BASED FEEDBACK GENERATION ─────────────────────────────────────
const CAT_KEYS = {
  jump:     ['broad_jump','slbj_LSI','triple_hop','cmj','sj','eur','cmj_mrsi','dj','dj_rsi','dsi'],
  aero:     ['mas','vo2max'],
  strength: ['sq_1rm_bw','tb_1rm_bw','bp_1rm_bw','imtp'],
  speed:    ['sprint10','sprint20','max_vel'],
};
const CAT_PLAIN = {
  jump:     'explosive power and jump ability',
  aero:     'aerobic fitness and running capacity',
  strength: 'overall strength levels',
  speed:    'sprint speed and acceleration',
};
const CAT_FOCUS = {
  jump:     'explosive power — jumping, bounding, and sprint-specific plyometrics',
  aero:     'aerobic base development — consistent high-intensity running and MAS-based interval sessions',
  strength: 'maximal strength — prioritising heavy compound lifts with progressive overload',
  speed:    'speed development — sprint mechanics, acceleration work, and max velocity exposure',
};
const CAT_COACH_REC = {
  jump:     'Plyometric volume and specificity should be reviewed. Consider bilateral and unilateral jump progressions to address the power deficit.',
  aero:     'Aerobic base development warrants prioritisation. Structured MAS-based interval sessions and repeated high-intensity running should be the central stimulus.',
  strength: 'Maximal strength development is the primary training priority for this athlete. Progressive overload in squat and trap bar deadlift should anchor the programme.',
  speed:    'Sprint mechanics and acceleration development require targeted attention. Repeated sprint sessions and max velocity exposure should be built into the weekly structure.',
};

function analyseFeedbackData(a) {
  const ld = buildLatestAcrossSessions(a.sessions);
  const pv = a.sessions.length > 1 ? a.sessions[1] : null;
  const bw = parseFloat(a.weight_kg);

  // Category scores
  const catAvg = {};
  Object.keys(CAT_KEYS).forEach(cat => {
    const scores = CAT_KEYS[cat].map(k => bs(ld[k], k)).filter(s => s !== null);
    catAvg[cat] = scores.length ? +(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2) : null;
  });

  // All scored metrics
  const metrics = [];
  Object.keys(NORMS).forEach(k => {
    const val = ld[k]; if (val == null) return;
    const score = bs(val, k); if (score === null) return;
    const prevVal = pv ? pv[k] : null;
    const changePct = (prevVal && prevVal !== 0) ? ((val - prevVal) / Math.abs(prevVal) * 100) : null;
    const improved = changePct !== null ? (NORMS[k].lb ? changePct < -0.5 : changePct > 0.5) : null;
    metrics.push({ k, val, score, changePct, improved, label: NORMS[k].label, u: NORMS[k].u, lb: NORMS[k].lb });
  });

  // Sort categories best → worst
  const rankedCats = Object.keys(catAvg).filter(c => catAvg[c] !== null).sort((a,b) => catAvg[b] - catAvg[a]);
  const best  = rankedCats[0] || null;
  const worst = rankedCats[rankedCats.length - 1] || null;

  const improved   = metrics.filter(m => m.improved === true).sort((a,b) => Math.abs(b.changePct) - Math.abs(a.changePct));
  const regressed  = metrics.filter(m => m.improved === false).sort((a,b) => Math.abs(b.changePct) - Math.abs(a.changePct));
  const exceedsCats = rankedCats.filter(c => catAvg[c] >= 3.5);
  const onTrackCats = rankedCats.filter(c => catAvg[c] >= 2.5 && catAvg[c] < 3.5);
  const concernCats = rankedCats.filter(c => catAvg[c] < 2.5);
  const lsiFlag  = ld.slbj_LSI != null && ld.slbj_LSI < 90;
  const hasPrev  = a.sessions.length > 1;

  return { ld, pv, bw, catAvg, rankedCats, best, worst, metrics, improved, regressed, exceedsCats, onTrackCats, concernCats, lsiFlag, hasPrev };
}

function buildCoachNotes(a, f) {
  const { ld, pv, catAvg, best, worst, improved, regressed, exceedsCats, concernCats, lsiFlag, hasPrev } = f;
  const date     = a.sessions[0]?.test_date || '—';
  const prevDate = pv?.test_date;
  const paras    = [];

  // ── Para 1: Profile overview ──
  const validCats = Object.values(catAvg).filter(s => s !== null);
  const overall   = validCats.length ? validCats.reduce((a,b)=>a+b,0)/validCats.length : null;
  const overallLbl = overall !== null ? catLabel(overall).l : 'insufficient data to rate';
  let p1 = `${a.name} (${a.position||'—'}, ${a.age||'—'} yrs, ${a.weight_kg||'—'} kg) most recently tested ${date} with ${a.sessions.length} session${a.sessions.length!==1?'s':''} on record. Overall physical profile: ${overallLbl}.`;
  if (a.injury_hx) p1 += ` Injury history: ${a.injury_hx}.`;
  if (!hasPrev)    p1 += ' Note: first session recorded — inter-session comparison not yet available.';
  paras.push(p1);

  // ── Para 2: Category breakdown ──
  const catLines = [];
  ['jump','aero','strength','speed'].forEach(cat => {
    if (catAvg[cat] === null) return;
    const cl = catLabel(catAvg[cat]);
    // Find best and worst metric in this category that have a score
    const catMetrics = CAT_KEYS[cat]
      .map(k => ({ k, val: ld[k], score: bs(ld[k], k) }))
      .filter(m => m.val != null && m.score !== null)
      .sort((a,b) => b.score - a.score);
    let line = `${CAT_LABELS[cat]}: ${cl.l}.`;
    if (catMetrics.length > 0) {
      const top = catMetrics[0];
      if (top.score >= 3) line += ` ${NORMS[top.k].label} is a highlight at ${top.val} ${NORMS[top.k].u} (${SL[top.score]}).`;
    }
    if (catMetrics.length > 1) {
      const bot = catMetrics[catMetrics.length - 1];
      if (bot.score <= 1) line += ` ${NORMS[bot.k].label} at ${bot.val} ${NORMS[bot.k].u} is a concern (${SL[bot.score]}).`;
    }
    catLines.push(line);
  });
  if (catLines.length) paras.push(catLines.join(' '));

  // ── Para 3: Progress since last session ──
  if (hasPrev && (improved.length || regressed.length)) {
    let p3 = `Progress since ${prevDate}: `;
    if (improved.length) {
      const names = improved.slice(0,2).map(m => `${m.label} (${m.changePct > 0 ? '+' : ''}${m.changePct.toFixed(1)}%)`);
      p3 += `Improvements noted in ${names.join(' and ')}. `;
    }
    if (regressed.length) {
      const names = regressed.slice(0,2).map(m => `${m.label} (${m.changePct.toFixed(1)}%)`);
      p3 += `Regressions observed in ${names.join(' and ')} — monitor whether this reflects fatigue, detraining, or measurement variance.`;
    }
    paras.push(p3.trim());
  }

  // ── Para 4: Priorities and flags ──
  let p4 = '';
  if (worst && catAvg[worst] !== null && catAvg[worst] < 2.5) {
    p4 += `Priority training focus: ${CAT_LABELS[worst]} (${catLabel(catAvg[worst]).l}). ${CAT_COACH_REC[worst]}`;
  } else if (worst) {
    p4 += `No category is in critical deficit. Continue general programme progression with emphasis on maintaining ${CAT_LABELS[best]||'current strengths'} while driving adaptation in ${CAT_LABELS[worst]}.`;
  }
  if (lsiFlag) p4 += ` LSI below 90% — limb asymmetry flag raised. Clinical review and targeted unilateral intervention are recommended before return-to-full-training progression.`;
  if (p4) paras.push(p4.trim());

  return paras.join('\n\n');
}

function buildAthleteMessage(a, f) {
  const { catAvg, best, worst, improved, regressed, exceedsCats, concernCats, lsiFlag, hasPrev } = f;
  const firstName = a.name.split(' ')[0];
  const paras = [];

  // ── Para 1: Positive opening ──
  let p1 = '';
  const goodCats = Object.keys(catAvg).filter(c => catAvg[c] !== null && catAvg[c] >= 3.0).sort((a,b) => catAvg[b] - catAvg[a]);
  if (goodCats.length > 0 && improved.length > 0) {
    p1 = `Good work in the testing. Your ${CAT_PLAIN[goodCats[0]]} is a real strength in your profile right now`;
    if (goodCats.length > 1) p1 += `, and your ${CAT_PLAIN[goodCats[1]]} is also tracking well`;
    p1 += '. ';
    p1 += `You\'ve also shown clear improvement since your last session, which shows the training is working — keep that consistency going.`;
  } else if (goodCats.length > 0) {
    p1 = `Your testing results show some clear positives. Your ${CAT_PLAIN[goodCats[0]]} is a genuine strength`;
    if (goodCats.length > 1) p1 += `, and ${CAT_PLAIN[goodCats[1]]} is tracking solidly too`;
    p1 += `. These are areas you can feel confident about going into the next block.`;
  } else if (improved.length > 0) {
    p1 = `The most important thing from this testing block is that you\'ve improved since last time. Progress is progress — the work you\'re putting in is showing up in the numbers. Keep the consistency going.`;
  } else {
    p1 = `Your testing results give us a clear baseline to work from. There are no red flags, and you have a solid foundation to build on going into the next block.`;
  }
  paras.push(p1.trim());

  // ── Para 2: Honest about areas needing work ──
  let p2 = '';
  if (concernCats.length > 0 || lsiFlag || regressed.length > 0) {
    if (worst && catAvg[worst] !== null && catAvg[worst] < 2.5) {
      p2 = `The area that needs the most focus right now is your ${CAT_PLAIN[worst]}. It\'s not where we need it to be at this level, and it\'s the priority for the next block. `;
    }
    if (regressed.length > 0 && hasPrev) {
      p2 += `There are a couple of areas that have dipped slightly since your last session. Nothing to be alarmed about, but it\'s a signal that we may need to look at your recovery or training load. `;
    }
    if (lsiFlag) {
      p2 += `There\'s also a noticeable difference in strength and power between your left and right leg right now. This is something we\'ll be targeting directly — leg imbalances can affect both your performance on the pitch and your injury risk, so it\'s important we address it.`;
    }
  }
  if (p2) paras.push(p2.trim());

  // ── Para 3: Clear focus ──
  let p3 = '';
  if (worst) {
    p3 = `For the next training block, the focus is ${CAT_FOCUS[worst]}. `;
    if (goodCats.length > 0 && goodCats[0] !== worst) {
      p3 += `Keep maintaining your ${CAT_PLAIN[goodCats[0]]} alongside this — we don\'t want that to drop while we bring the other areas up. `;
    }
  } else {
    p3 = `For the next block, the goal is to keep building across the board. `;
  }
  p3 += `Stay consistent with your sessions, look after your recovery, and the improvements will follow.`;
  paras.push(p3.trim());

  return paras.join('\n\n');
}

function generateFeedback() {
  const a = athleteMap[selectedId]; if (!a) return;
  const fc = document.getElementById('feedbackContent'); if (!fc) return;
  if (!a.sessions.length) {
    fc.innerHTML = `<div class="feedback-empty"><h3>No data yet</h3><p>Add test sessions for ${a.name} to generate feedback.</p></div>`;
    return;
  }
  const f = analyseFeedbackData(a);
  const coachNotes  = buildCoachNotes(a, f);
  const athleteMsg  = buildAthleteMessage(a, f);
  renderFeedback(a, coachNotes, athleteMsg);
}

// ─── PRINT REPORT GENERATOR ──────────────────────────────────────────────────
function generatePrintReport() {
  const a = athleteMap[selectedId];
  if (!a || !a.sessions.length) { alert('No data available to print.'); return; }

  // Temporarily show hidden tabs so Chart.js and the quadrant SVG can render
  const trendsEl   = document.querySelector('.tc[data-t="trends"]');
  const quadrantEl = document.querySelector('.tc[data-t="quadrant"]');
  const origT = trendsEl?.style.display;
  const origQ = quadrantEl?.style.display;
  if (trendsEl)   trendsEl.style.display   = 'block';
  if (quadrantEl) quadrantEl.style.display = 'block';
  drawCharts();
  drawQuadrant(currentStrengthAxis);

  // Wait for Chart.js to finish rendering before capturing canvas data
  setTimeout(() => {
    // ── Capture trend chart images ──────────────────────────────────────────
    const chartImages = [];
    document.getElementById('chartGrid')?.querySelectorAll('.chart-wrap').forEach(wrap => {
      if (wrap.style.display === 'none') return;
      const title  = wrap.querySelector('.chart-title')?.textContent?.trim() || '';
      const canvas = wrap.querySelector('canvas');
      if (canvas) {
        try {
          const url = canvas.toDataURL('image/png', 0.85);
          if (url && url.length > 200) chartImages.push({ title, url });
        } catch(e) {}
      }
    });

    // ── Capture quadrant SVG ────────────────────────────────────────────────
    const qContainer = document.getElementById('quadrantContainer');
    const quadrantSVG = (qContainer?.innerHTML || '').includes('<svg') ? qContainer.innerHTML : '';

    // Restore tabs to original state
    if (trendsEl)   trendsEl.style.display   = origT   || '';
    if (quadrantEl) quadrantEl.style.display = origQ   || '';

    // ── Build the print report ──────────────────────────────────────────────
    _buildAndOpenPrintReport(a, chartImages, quadrantSVG);
  }, 350);
}

function _buildAndOpenPrintReport(a, chartImages, quadrantSVG) {
  const ld    = buildLatestAcrossSessions(a.sessions);
  // prevVal(key): find most recent previous session with a value for this key
  const prevVal = k => { for(let i=1;i<a.sessions.length;i++){ if(a.sessions[i][k]!=null) return a.sessions[i][k]; } return null; };
  const pv    = a.sessions.length > 1 ? a.sessions[1] : null; // kept for backward compat
  const bw    = parseFloat(a.weight_kg);
  const logoSrc   = document.querySelector('.sb-brand img')?.src || '';
  const coachName = getConfig().coachName || 'Physical Performance Coach - Henri Joensuu';
  const today = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});

  // Build a date map: for each metric key, which session date was the source?
  const dateSrc = {};

  // Also map derived keys back to the session that provided the raw input
  ['slbj_L','slbj_R','slbj_LSI'].forEach(k => {
    for (const s of a.sessions) {
      if (s.slbj_L != null || s.slbj_R != null) { dateSrc[k] = s.test_date; break; }

  ['sq_1rm_bw','tb_1rm_bw','bp_1rm_bw'].forEach((k,i) => {
    const rawKey = ['sq_1rm','tb_1rm','bp_1rm'][i];
    for (const s of a.sessions) {
      if (s[rawKey] != null) { dateSrc[k] = s.test_date; break; }

  });
  // EUR and MAS/VO2 derive from CMJ+SJ and TT distance
  for (const s of a.sessions) { if (s.cmj!=null&&s.sj!=null){ dateSrc['eur']=s.test_date; break; } }
  for (const s of a.sessions) { if (s.mas!=null){ dateSrc['mas']=dateSrc['vo2max']=s.test_date; break; } }

  const latestDate = a.sessions[0]?.test_date;

  function getCatStatus(keys) {
    const scores = keys.map(k=>bs(ld[k],k)).filter(s=>s!==null);
    if (!scores.length) return null;
    return catLabel(scores.reduce((a,b)=>a+b,0)/scores.length);
  }
  const catDefs = [
    { name:'Jump / Power',  keys:['broad_jump','slbj_LSI','triple_hop','cmj','sj','eur','cmj_mrsi','dj','dj_rsi','dsi'] },

    { name:'Speed',         keys:['sprint10','sprint20','max_vel'] },

  function pctHtml(val, prev, lb) {
    if (val==null||prev==null||isNaN(prev)||prev===0) return '<span style="color:#ccc">—</span>';

  }

  function badge(score, noNorm) {
    if (noNorm||score===null) return '<span style="color:#aaa;font-size:10px;font-style:italic">No validated norm</span>';

      ${a.sessions[0]?.notes?`<div style="margin-top:10px;padding:8px 12px;background:#f8f8f8;border-left:3px solid #1a56db;border-radius:0 4px 4px 0;font-size:10.5px;color:#444;line-height:1.6"><span style="font-size:9px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:2px">Session note</span>${a.sessions[0].notes}</div>`:''}
    </div>
  </div>

  <!-- Category Overview -->
  <div style="font-size:9px;font-weight:700;color:#7a8290;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;padding-bottom:3px;border-bottom:1px solid #ebebeb">Performance Category Status</div>
  <div style="display:flex;gap:8px;margin-bottom:18px">${catCardsHtml}</div>

  <!-- Test Results -->
  <div style="font-size:9px;font-weight:700;color:#7a8290;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;padding-bottom:3px;border-bottom:1px solid #ebebeb">
    Test Results${pv?` <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#bbb">vs previous: ${pv.test_date}</span>`:''}
  </div>
  ${section('Jump / Power',jumpM)}
  ${section('Aerobic Fitness',aeroM)}
  ${section('Strength — Lifts (×BW)',strM)}
  ${section('Speed (Vuemotion)',spdM)}

  ${chartsHtml}
  ${quadrantHtml}
  ${feedbackHtml}

  <!-- Footer -->
  <div style="margin-top:20px;padding-top:8px;border-top:1px solid #ebebeb;font-size:9px;color:#bbb;display:flex;justify-content:space-between">
    <span>FootballFit · Individual Coaching · ${a.name}</span>
    <span>Normative ranges: professional football literature</span>
  </div>

</div>
<script>window.onload=()=>setTimeout(()=>window.print(),500);<\/script>
</body></html>`;

  const win = window.open('','_blank','width=900,height=700');
  if (!win) { alert('Please allow popups for this page to generate the print report.'); return; }
  win.document.write(reportHTML);
  win.document.close();
}

// ─── TEST HISTORY LOG ────────────────────────────────────────────────────────
function renderHistory() {
  const a = athleteMap[selectedId];
  const el = document.getElementById('historyContent');
  if (!a || !el) return;
  if (!a.sessions.length) { el.innerHTML='<p style="color:var(--text-muted);padding:8px">No sessions recorded.</p>'; return; }

  const COLS = [
    { key:'broad_jump', label:'Broad jump',   u:'cm',  cat:'Jump' },
    { key:'slbj_L',     label:'SL jump L',    u:'cm',  cat:'Jump' },
    { key:'slbj_R',     label:'SL jump R',    u:'cm',  cat:'Jump' },
    { key:'slbj_LSI',   label:'LSI',          u:'%',   cat:'Jump' },
    { key:'triple_hop', label:'Triple hop',   u:'cm',  cat:'Jump' },
    { key:'cmj',        label:'CMJ',          u:'cm',  cat:'Jump' },
    { key:'sj',         label:'SJ',           u:'cm',  cat:'Jump' },
    { key:'eur',        label:'EUR',          u:'',    cat:'Jump' },
    { key:'cmj_mrsi',   label:'CMJ mRSI',     u:'m/s', cat:'Jump' },
    { key:'dj',         label:'DJ',           u:'cm',  cat:'Jump' },
    { key:'dj_rsi',     label:'DJ RSI',       u:'m/s', cat:'Jump' },
    { key:'dsi',        label:'DSI',          u:'',    cat:'Jump' },
    { key:'mas',        label:'MAS',          u:'m/s', cat:'Aerobic' },
    { key:'vo2max',     label:'VO₂max',       u:'ml/kg/min', cat:'Aerobic' },
    { key:'tt_speed',   label:'TT speed',     u:'m/s', cat:'Aerobic' },
    { key:'yoyo_ir2',   label:'Yo-Yo IR2',    u:'m',   cat:'Aerobic' },
    { key:'beep_level', label:'Beep',         u:'lvl', cat:'Aerobic' },
    { key:'bronco',     label:'Bronco',       u:'s',   cat:'Aerobic', lb:true },
    { key:'sq_1rm_bw',  label:'Squat ×BW',   u:'',    cat:'Strength' },
    { key:'tb_1rm_bw',  label:'Trap DL ×BW', u:'',    cat:'Strength' },
    { key:'bp_1rm_bw',  label:'Bench ×BW',   u:'',    cat:'Strength' },
    { key:'imtp',       label:'IMTP',         u:'N/kg',cat:'Strength' },
    { key:'sprint10',   label:'10m',          u:'s',   cat:'Speed', lb:true },
    { key:'sprint20',   label:'20m',          u:'s',   cat:'Speed', lb:true },
    { key:'max_vel',    label:'Max vel',      u:'m/s', cat:'Speed' },
  ];

  const sessions = [...a.sessions].reverse(); // oldest → newest
  const activeCols = COLS.filter(c => sessions.some(s => s[c.key] != null));
  const cats = ['Jump','Aerobic','Strength','Speed'];
  const catSpans = cats.map(cat => ({ cat, count: activeCols.filter(c=>c.cat===cat).length })).filter(c=>c.count>0);

  const scoreColor = (key, val) => {
    if (val==null) return '';
    const s = bs(val, key); if (s===null) return '';
    return ['#dc2626','#c2410c','#b45309','#1a56db','#16a34a'][s];
  };

  const fmtCell = (key, val) => {
    if (val==null) return `<span style="color:var(--border)">—</span>`;
    let display = val;
    if (key==='bronco') display = fmtTime(val);
    else if (key==='tt_speed') display = val.toFixed(2);
    else if (typeof val==='number' && !Number.isInteger(val)) display = val < 5 ? val.toFixed(2) : val.toFixed(1);
    const col = scoreColor(key, val);
    return `<span style="${col?`color:${col};font-weight:700`:'color:var(--text-secondary)'}">${display}</span>`;
  };

  const th = (txt, extra='') => `<th style="padding:6px 9px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);background:var(--surface-alt);border:1px solid var(--border);white-space:nowrap;text-align:center${extra}">${txt}</th>`;

  let t = `<table style="border-collapse:collapse;font-size:11px">
  <thead>
    <tr>
      <th style="padding:6px 10px;font-size:9px;font-weight:700;color:var(--text-muted);background:var(--surface-alt);border:1px solid var(--border);text-align:left;position:sticky;left:0;z-index:2" rowspan="2">Date</th>
      ${catSpans.map(c=>`<th colspan="${c.count}" style="padding:6px 9px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);background:var(--surface-alt);border:1px solid var(--border);border-bottom:2px solid var(--accent);text-align:center">${c.cat}</th>`).join('')}
    </tr>
    <tr>${activeCols.map(c=>th(`${c.label}${c.u?`<br><span style="font-weight:400;font-size:8px;opacity:.7">${c.u}</span>`:''}`)).join('')}</tr>
  </thead>
  <tbody>`;

  sessions.forEach((s,i) => {
    const bg = i%2===0 ? 'var(--surface)' : 'var(--surface-alt)';
    const noteHtml = s.notes ? `<br><span style="font-size:9px;color:var(--text-muted);font-style:italic;font-weight:400">${s.notes}</span>` : '';
    t += `<tr>
      <td style="padding:6px 10px;font-size:11px;font-weight:600;color:var(--text-secondary);background:${bg};border:1px solid var(--border);position:sticky;left:0;z-index:1;min-width:88px">${s.test_date||'—'}${noteHtml}</td>
      ${activeCols.map(c=>`<td style="padding:5px 9px;text-align:center;background:${bg};border:1px solid var(--border)">${fmtCell(c.key,s[c.key])}</td>`).join('')}
    </tr>`;
  });

  el.innerHTML = t + `</tbody></table>
  <p style="font-size:10px;color:var(--text-muted);margin-top:8px">Oldest → newest · Values colour-coded: <span style="color:#16a34a">●</span> Exceeds <span style="color:#1a56db">●</span> Meets <span style="color:#b45309">●</span> Near <span style="color:#c2410c">●</span> Below <span style="color:#dc2626">●</span> Priority</p>`;
}

loadData();

// ─── STRENGTH-SPEED QUADRANT ─────────────────────────────────────────────────
// Extensible axis options — add new entries here as tests are added.
// Future option example (when force plate available):
//   { key: 'cmj_peak_power_bw', label: 'CMJ peak power ×BW' }
const QUAD_STR_AXES = [
  { key: 'tb_1rm_bw', label: 'Trap bar DL ×BW' },
  { key: 'sq_1rm_bw', label: 'Back squat ×BW'  },
  { key: 'imtp',      label: 'IMTP (N/kg)'      },
];
let currentStrengthAxis = QUAD_STR_AXES[0].key;

function setStrengthAxis(key, btn) {
  currentStrengthAxis = key;
  document.querySelectorAll('.axis-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  drawQuadrant(key);
}

function drawQuadrant(strKey) {
  const container = document.getElementById('quadrantContainer');
  if (!container) return;

  const velKey  = 'max_vel';
  const strNorm = NORMS[strKey];
  const velNorm = NORMS[velKey];
  if (!strNorm || !velNorm) return;

  const allAthletes = Object.values(athleteMap);
  const points = [];

  allAthletes.forEach(a => {
    const ld  = buildLatestAcrossSessions(a.sessions);
    const str = ld[strKey];
    const vel = ld[velKey];
    if (str == null || vel == null) return;

    const isCurrent = a.id === selectedId;
    const ini = a.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

    const trail = [];
    if (isCurrent && a.sessions.length > 1) {
      a.sessions.slice(1).forEach(s => {
        const sv = s[velKey], ss = s[strKey];
        if (sv != null && ss != null) trail.push({ vel:sv, str:ss, date:s.test_date });
      });
      trail.reverse();
    }

    points.push({ id:a.id, name:a.name, ini, str, vel, isCurrent, trail });
  });

  const W=580, H=460, ML=56, MR=24, MT=24, MB=56;
  const CW=W-ML-MR, CH=H-MT-MB;

  const strPad=(strNorm.max-strNorm.min)*0.7, velPad=(velNorm.max-velNorm.min)*1.0;
  let xMin=Math.max(0, strNorm.min-strPad), xMax=strNorm.max+strPad;
  let yMin=Math.max(0, velNorm.min-velPad), yMax=velNorm.max+velPad;

  // Extend axes to fit all actual data points — never clip a dot
  if (points.length) {
    const allStr = points.map(p=>p.str), allVel = points.map(p=>p.vel);
    const datXMin=Math.min(...allStr), datXMax=Math.max(...allStr);
    const datYMin=Math.min(...allVel), datYMax=Math.max(...allVel);
    const xPad=(xMax-xMin)*0.12, yPad=(yMax-yMin)*0.12;
    xMin=Math.min(xMin, datXMin-xPad);
    xMax=Math.max(xMax, datXMax+xPad);
    yMin=Math.min(yMin, datYMin-yPad);
    yMax=Math.max(yMax, datYMax+yPad);
  }

  const sx = v => ML+(v-xMin)/(xMax-xMin)*CW;
  const sy = v => MT+CH-(v-yMin)/(yMax-yMin)*CH;

  const xDiv=(strNorm.min+strNorm.max)/2, yDiv=(velNorm.min+velNorm.max)/2;
  const xDivPx=sx(xDiv), yDivPx=sy(yDiv);

  let s = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-height:440px;font-family:-apple-system,BlinkMacSystemFont,sans-serif">`;

  // Quadrant backgrounds
  [[ML,MT,xDivPx-ML,yDivPx-MT,'#fff8e1'],[xDivPx,MT,W-MR-xDivPx,yDivPx-MT,'#f0fdf4'],
   [ML,yDivPx,xDivPx-ML,H-MB-yDivPx,'#fef2f2'],[xDivPx,yDivPx,W-MR-xDivPx,H-MB-yDivPx,'#eff6ff']]
    .forEach(([x,y,w,h,fill]) => { s += `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" opacity="0.75"/>`; });

  // Norm band overlays
  s += `<rect x="${sx(strNorm.min)}" y="${MT}" width="${sx(strNorm.max)-sx(strNorm.min)}" height="${CH}" fill="rgba(26,86,219,0.04)"/>`;
  s += `<rect x="${ML}" y="${sy(velNorm.max)}" width="${CW}" height="${sy(velNorm.min)-sy(velNorm.max)}" fill="rgba(26,86,219,0.04)"/>`;

  // Norm boundary dashes
  [sx(strNorm.min),sx(strNorm.max)].forEach(px => { s += `<line x1="${px}" y1="${MT}" x2="${px}" y2="${H-MB}" stroke="rgba(26,86,219,0.2)" stroke-width="1" stroke-dasharray="3,3"/>`; });
  [sy(velNorm.min),sy(velNorm.max)].forEach(py => { s += `<line x1="${ML}" y1="${py}" x2="${W-MR}" y2="${py}" stroke="rgba(26,86,219,0.2)" stroke-width="1" stroke-dasharray="3,3"/>`; });

  // Main dividers
  s += `<line x1="${xDivPx}" y1="${MT}" x2="${xDivPx}" y2="${H-MB}" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>`;
  s += `<line x1="${ML}" y1="${yDivPx}" x2="${W-MR}" y2="${yDivPx}" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,3"/>`;

  // Border
  s += `<rect x="${ML}" y="${MT}" width="${CW}" height="${CH}" fill="none" stroke="#e4e6ea" stroke-width="1"/>`;

  // Quadrant labels
  [
    ['Speed Dominant','→ Prioritise strength', ML+8,    MT+16,   'start'],
    ['Well-rounded',  '→ Maintain & refine',   W-MR-8,  MT+16,   'end'  ],
    ['Developing',    '→ Foundation needed',   ML+8,    H-MB-8,  'start'],
    ['Force Dominant','→ Prioritise speed',    W-MR-8,  H-MB-8,  'end'  ],
  ].forEach(([title,sub,x,y,anchor]) => {
    s += `<text x="${x}" y="${y}"    font-size="10" font-weight="600" fill="#64748b" text-anchor="${anchor}">${title}</text>`;
    s += `<text x="${x}" y="${y+13}" font-size="9"  fill="#94a3b8" text-anchor="${anchor}">${sub}</text>`;
  });

  // Axis ticks
  for(let i=0;i<=5;i++){
    const vx=xMin+(xMax-xMin)*i/5, px=sx(vx);
    s += `<line x1="${px}" y1="${H-MB}" x2="${px}" y2="${H-MB+4}" stroke="#94a3b8" stroke-width="1"/>`;
    s += `<text x="${px}" y="${H-MB+15}" font-size="9" text-anchor="middle" fill="#7a8290">${vx.toFixed(1)}</text>`;
    const vy=yMin+(yMax-yMin)*i/5, py=sy(vy);
    s += `<line x1="${ML-4}" y1="${py}" x2="${ML}" y2="${py}" stroke="#94a3b8" stroke-width="1"/>`;
    s += `<text x="${ML-7}" y="${py+3}" font-size="9" text-anchor="end" fill="#7a8290">${vy.toFixed(1)}</text>`;
  }

  // Axis labels
  s += `<text x="${ML+CW/2}" y="${H-6}" font-size="11" text-anchor="middle" fill="#444c56" font-weight="500">${strNorm.label} (${strNorm.u})</text>`;
  s += `<text x="11" y="${MT+CH/2}" font-size="11" text-anchor="middle" fill="#444c56" font-weight="500" transform="rotate(-90,11,${MT+CH/2})">${velNorm.label} (${velNorm.u})</text>`;

  // Anonymous other athletes
  points.filter(p=>!p.isCurrent).forEach(p => {
    s += `<circle cx="${sx(p.str)}" cy="${sy(p.vel)}" r="6" fill="#cbd5e1" stroke="#94a3b8" stroke-width="1" opacity="0.65"/>`;
  });

  // Selected athlete
  const cur = points.find(p=>p.isCurrent);
  if (cur) {
    // Trail
    if (cur.trail.length > 0) {
      const allT=[...cur.trail,{str:cur.str,vel:cur.vel}];
      s += `<path d="${allT.map((p,i)=>`${i===0?'M':'L'}${sx(p.str).toFixed(1)},${sy(p.vel).toFixed(1)}`).join(' ')}" fill="none" stroke="#1a56db" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>`;
      cur.trail.forEach(p => {
        s += `<circle cx="${sx(p.str)}" cy="${sy(p.vel)}" r="5" fill="#bfdbfe" stroke="#1a56db" stroke-width="1.5" opacity="0.55"/>`;
      });
    }
    // Main dot
    const dotCol = sidebarCol(athleteMap[selectedId]?.sessions[0]);
    const px=sx(cur.str), py=sy(cur.vel);
    s += `<circle cx="${px}" cy="${py}" r="12" fill="${dotCol}" stroke="#fff" stroke-width="2.5"/>`;
    s += `<text x="${px}" y="${py+4}" font-size="9" text-anchor="middle" fill="#fff" font-weight="700">${cur.ini}</text>`;
    // Label — smart positioning to avoid edges
    const lx = px+16 > W-MR-90 ? px-16 : px+16;
    const la = px+16 > W-MR-90 ? 'end' : 'start';
    const ly = py-10 < MT+20 ? py+22 : py-10;
    s += `<text x="${lx}" y="${ly}"    font-size="11" text-anchor="${la}" fill="#0d1117" font-weight="600">${cur.name}</text>`;
    s += `<text x="${lx}" y="${ly+13}" font-size="10" text-anchor="${la}" fill="#7a8290">${cur.str}${strNorm.u} · ${cur.vel} m/s</text>`;
  } else {
    s += `<text x="${ML+CW/2}" y="${MT+CH/2-8}" font-size="13" text-anchor="middle" fill="#7a8290">No data available for this athlete.</text>`;
    s += `<text x="${ML+CW/2}" y="${MT+CH/2+12}" font-size="11" text-anchor="middle" fill="#94a3b8">Add ${strNorm.label} and max velocity to your Google Sheet.</text>`;
  }

  s += '</svg>';
  container.innerHTML = s;
}
</script>
